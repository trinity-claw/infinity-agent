services:
  infinity-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infinity-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIR=${CHROMA_PERSIST_DIR:-/app/data/chroma_db}
      - SQLITE_DB_PATH=${SQLITE_DB_PATH:-/app/data/sqlite_db/langgraph.sqlite}
    volumes:
      - chroma_data:/app/data/chroma_db
      - sqlite_data:/app/data/sqlite_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  evolution-api:
    image: atendesmart/evolution-api:latest
    container_name: evolution-api
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - DOCKER_ENV=true
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS
      - AUTHENTICATION_API_KEY=${AUTHENTICATION_API_KEY:-change_me_in_env}
    volumes:
      - evolution_instances:/evolution/instances
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local
  sqlite_data:
    driver: local
  evolution_instances:
    driver: local
